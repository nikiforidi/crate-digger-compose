services:
  # === API Gateway ===
  gateway:
    image: ghcr.io/nikiforidi/api-gateway:${GATEWAY_VERSION}
    expose: ["8000"]
    env_file: .env.testing
    depends_on:
      auth-service: { condition: service_healthy }
      economy-service: { condition: service_healthy }
      crate-digger: { condition: service_healthy }
      relay-api: { condition: service_healthy }
      preview-api: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [app-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # === Prometheus ===
  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks: [app-net]
    restart: unless-stopped

  # === Nginx ===
  nginx:
    image: nginx:alpine
    ports: ["${GATEWAY_PORT}:80"]
    volumes: ["./nginx.conf:/etc/nginx/nginx.conf:ro"]
    depends_on:
      gateway: { condition: service_healthy }
    networks: [app-net]
    restart: unless-stopped

  # === Auth Service ===
  auth-service:
    image: ghcr.io/nikiforidi/auth-service:${AUTH_VERSION}
    expose: ["8000"]
    env_file: .env.testing
    depends_on:
      db: { condition: service_healthy }
      db-init: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    networks: [app-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # === Crate Digger ===
  crate-digger:
    image: ghcr.io/nikiforidi/crate-digger:${CRATE_VERSION}
    expose: ["8000"]
    env_file: .env.testing
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    networks: [app-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # === Economy Service ===
  economy-service:
    image: ghcr.io/nikiforidi/economy-service:${ECONOMY_VERSION}
    expose: ["8000"]
    env_file: .env.testing
    depends_on:
      db: { condition: service_healthy }
      db-init: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      crate-digger: { condition: service_healthy }
      auth-service: { condition: service_healthy }
    networks: [app-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # === YTB Audio Relay ===
  relay-api:
    image: ghcr.io/nikiforidi/ytb-audio-relay:${RELAY_VERSION}
    expose: ["8000"]
    env_file: .env.testing
    volumes:
      - ./sessions:/app/sessions
    depends_on:
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    networks: [app-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  relay-worker:
    image: ghcr.io/nikiforidi/ytb-audio-relay:${RELAY_VERSION}
    env_file: .env.testing
    volumes:
      - ./sessions:/app/sessions
    depends_on:
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    networks: [app-net]
    command: python -m arq worker.WorkerSettings
    restart: unless-stopped
    healthcheck:
      disable: true

  # === YTB Audio Preview ===
  preview-api:
    image: ghcr.io/nikiforidi/ytb-audio-preview:${PREVIEW_VERSION}
    expose: ["8000"]
    env_file: .env.testing
    depends_on:
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    networks: [app-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  preview-worker:
    image: ghcr.io/nikiforidi/ytb-audio-preview:${PREVIEW_VERSION}
    env_file: .env.testing
    depends_on:
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    networks: [app-net]
    command: python -m arq worker.WorkerSettings
    restart: unless-stopped
    healthcheck:
      disable: true

  # === Shared Infrastructure ===
  db:
    image: postgres:15-alpine
    env_file: .env.testing
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [app-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  db-init:
    image: postgres:15-alpine
    env_file: .env.testing
    depends_on:
      db: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      PGPASSWORD=$${DB_PASSWORD} psql -h db -U postgres -c 'CREATE DATABASE auth_db;' 2>/dev/null;
      PGPASSWORD=$${DB_PASSWORD} psql -h db -U postgres -c 'CREATE DATABASE economy_db;' 2>/dev/null;
      exit 0
      "
    networks: [app-net]
    restart: "no"

  redis:
    image: redis:7-alpine
    env_file: .env.testing
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb
    volumes:
      - redis-data:/data
    networks: [app-net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    env_file: .env.testing
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks: [app-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  createbuckets:
    image: minio/mc:latest
    env_file: .env.testing
    restart: "no"
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY} &&
      /usr/bin/mc mb --ignore-existing myminio/${S3_BUCKET_NAME} &&
      /usr/bin/mc mb --ignore-existing myminio/ytb-audio-previews &&
      /usr/bin/mc anonymous set public myminio/${S3_BUCKET_NAME} &&
      /usr/bin/mc anonymous set public myminio/ytb-audio-previews;
      exit 0
      "
    networks: [app-net]

volumes:
  postgres-data:
  redis-data:
  minio-data:
  prometheus-data:

networks:
  app-net:
    driver: bridge