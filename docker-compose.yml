services:
  # === API Gateway ===
  gateway:
    image: nginx:alpine
    ports: ["${GATEWAY_PORT:-80}:80"]
    volumes: ["./nginx.conf:/etc/nginx/nginx.conf:ro"]
    depends_on:
      crate-digger: { condition: service_healthy }
      relay-api: { condition: service_healthy }
      preview-api: { condition: service_healthy }
    networks: [app-net]
    restart: unless-stopped

  # === Service 1: crate-digger ===
  crate-digger:
    image: ghcr.io/nikiforidi/crate-digger:${CRATE_VERSION:-1.0.3}
    expose: ["8000"]
    env_file: [.env.example]
    environment:
      - NODE_ENV=test
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - DISCOGS_TOKEN=${DISCOGS_TOKEN}
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    networks: [app-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # === Service 2: ytb-audio-relay ===
  relay-api:
    image: ghcr.io/nikiforidi/ytb-audio-relay:${RELAY_VERSION:-latest}
    expose: ["8000"]
    environment:
      - API_ID=${API_ID:-123456}
      - API_HASH=${API_HASH:-dummy}
      - PHONE=${PHONE:-+10000000000}
      - SESSION_NAME=/app/sessions/ytb_session
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${S3_ACCESS_KEY}
      - MINIO_SECRET_KEY=${S3_SECRET_KEY}
      - MINIO_SECURE=false
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL:-http://localhost:9000}
      - MINIO_BUCKET=${S3_BUCKET_NAME}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ./sessions:/app/sessions
    depends_on:
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    networks: [app-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  relay-worker:
    image: ghcr.io/nikiforidi/ytb-audio-relay:${RELAY_VERSION:-latest}
    environment:
      - API_ID=${API_ID:-123456}
      - API_HASH=${API_HASH:-dummy}
      - PHONE=${PHONE:-+10000000000}
      - SESSION_NAME=/app/sessions/ytb_session
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${S3_ACCESS_KEY}
      - MINIO_SECRET_KEY=${S3_SECRET_KEY}
      - MINIO_SECURE=false
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL:-http://localhost:9000}
      - MINIO_BUCKET=${S3_BUCKET_NAME}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ./sessions:/app/sessions
    depends_on:
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    networks: [app-net]
    command: python -m arq worker.WorkerSettings
    restart: unless-stopped
    # 🔑 MAGIC BULLET 1: Disable healthcheck for background ARQ worker
    healthcheck:
      disable: true

  # === Service 3: ytb-audio-preview ===
  preview-api:
    image: ghcr.io/nikiforidi/ytb-audio-preview:${PREVIEW_VERSION:-v0.1.2}
    expose: ["8000"]
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${S3_ACCESS_KEY}
      - MINIO_SECRET_KEY=${S3_SECRET_KEY}
      - MINIO_SECURE=false
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL:-http://localhost:9000}
      - SOURCE_BUCKET=${S3_BUCKET_NAME}
      - PREVIEW_BUCKET=ytb-audio-previews
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - REDIS_EVENT_CHANNEL=preview:trigger
    depends_on:
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    networks: [app-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  preview-worker:
    image: ghcr.io/nikiforidi/ytb-audio-preview:${PREVIEW_VERSION:-v0.1.2}
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${S3_ACCESS_KEY}
      - MINIO_SECRET_KEY=${S3_SECRET_KEY}
      - MINIO_SECURE=false
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL:-http://localhost:9000}
      - SOURCE_BUCKET=${S3_BUCKET_NAME}
      - PREVIEW_BUCKET=ytb-audio-previews
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - REDIS_EVENT_CHANNEL=preview:trigger
    depends_on:
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    networks: [app-net]
    command: python -m arq worker.WorkerSettings
    restart: unless-stopped
    # 🔑 MAGIC BULLET 1 (Again): Disable healthcheck for background ARQ worker
    healthcheck:
      disable: true

  # === Shared Infrastructure ===
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-crate_digger}
    networks: [app-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB:-crate_digger}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb
    networks: [app-net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    networks: [app-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # 🔑 MAGIC BULLET 3: Dedicated init container for buckets
  createbuckets:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY} &&
      /usr/bin/mc mb --ignore-existing myminio/${S3_BUCKET_NAME} &&
      /usr/bin/mc mb --ignore-existing myminio/ytb-audio-previews &&
      /usr/bin/mc anonymous set public myminio/${S3_BUCKET_NAME} &&
      /usr/bin/mc anonymous set public myminio/ytb-audio-previews &&
      exit 0"
    networks: [app-net]

networks:
  app-net:
    driver: bridge