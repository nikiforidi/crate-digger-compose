services:
  # === API Gateway ===
  gateway:
    image: ghcr.io/nikiforidi/api-gateway:${GATEWAY_VERSION:-latest}
    platform: linux/amd64
    expose: ["8000"]
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8000
      - ECONOMY_SERVICE_URL=http://conomy-service:8000
      - CRATE_SERVICE_URL=http://crate-digger:8000
      - MARKETPLACE_SERVICE_URL=http://marketplace-service:8003
      - RELAY_SERVICE_URL=http://relay-api:8000
      - PREVIEW_SERVICE_URL=http://preview-api:8000
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/3
      - HTTP_TIMEOUT=30.0
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - RATE_LIMIT_DEFAULT=100/minute
      - RATE_LIMIT_AUTH=10/minute
      - CIRCUIT_BREAKER_FAIL_MAX=5
      - CIRCUIT_BREAKER_RESET_TIMEOUT=60
      - CACHE_TTL_RELEASES=3600
      - CACHE_TTL_SELLERS=60
      - CACHE_TTL_USERS=300
    depends_on:
      auth-service: { condition: service_healthy }
      economy-service: { condition: service_healthy }
      crate-digger: { condition: service_healthy }
      marketplace-service: { condition: service_healthy }
      relay-api: { condition: service_healthy }
      preview-api: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [app-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # === Service 6: marketplace-frontend ===
  marketplace-frontend:
    image: ghcr.io/nikiforidi/marketplace-frontend:${FRONTEND_VERSION:-latest}
    platform: linux/amd64
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_GATEWAY_URL=${NEXT_PUBLIC_GATEWAY_URL:-http://localhost}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost}
    depends_on:
      gateway: { condition: service_healthy }
    networks: [app-net]
    restart: unless-stopped

  # === Prometheus ===
  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks: [app-net]
    restart: unless-stopped

  # === Nginx ===
  nginx:
    image: nginx:alpine
    ports: ["${GATEWAY_PORT:-80}:80"]
    volumes: ["./nginx.conf:/etc/nginx/nginx.conf:ro"]
    depends_on:
      gateway: { condition: service_healthy }
      marketplace-frontend: { condition: service_started }
    networks: [app-net]
    restart: unless-stopped

  # === Service 0: auth-service ===
  auth-service:
    image: ghcr.io/nikiforidi/auth-service:${AUTH_VERSION:-latest}
    platform: linux/amd64
    expose: ["8000"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${DB_PASSWORD}@db:5432/auth_db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - UNISENDER_API_KEY=${UNISENDER_API_KEY}
      - UNISENDER_LIST_ID=${UNISENDER_LIST_ID}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - EMAIL_BACKEND=${EMAIL_BACKEND:-unisender}
      - INITIAL_ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL:-}
    depends_on:
      db: { condition: service_healthy }
      db-init: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    networks: [app-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # === Service 1: crate-digger ===
  crate-digger:
    image: ghcr.io/nikiforidi/crate-digger:${CRATE_VERSION:-1.0.3}
    platform: linux/amd64
    expose: ["8000"]
    environment:
      - NODE_ENV=test
      - DATABASE_URL=postgresql+psycopg2://postgres:${DB_PASSWORD}@db:5432/crate_digger
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - DISCOGS_TOKEN=${DISCOGS_TOKEN}
    depends_on:
      db: { condition: service_healthy }
      db-init: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    networks: [app-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # === Service 2: economy-service ===
  economy-service:
    image: ghcr.io/nikiforidi/economy-service:${ECONOMY_VERSION:-latest}
    platform: linux/amd64
    expose: ["8000"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${DB_PASSWORD}@db:5432/economy_db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/2
      - PLATFORM_FEE_PERCENTAGE=${PLATFORM_FEE_PERCENTAGE:-0.10}
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID}
      - YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY}
      - YOOKASSA_RETURN_URL=${YOOKASSA_RETURN_URL:-http://localhost/checkout/result}
      - YOOKASSA_TEST_MODE=${YOOKASSA_TEST_MODE:-true}
      - CATALOG_SERVICE_URL=http://crate-digger:8000
      - AUTH_SERVICE_URL=http://auth-service:8000
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - MARKETPLACE_SERVICE_URL=http://marketplace-service:8003
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-super_secret_internal_token_change_in_prod}
    depends_on:
      db: { condition: service_healthy }
      db-init: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      crate-digger: { condition: service_healthy }
      auth-service: { condition: service_healthy }
    networks: [app-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # === Service 3: ytb-audio-relay ===
  relay-api:
    image: ghcr.io/nikiforidi/ytb-audio-relay:${RELAY_VERSION:-latest}
    platform: linux/amd64
    expose: ["8000"]
    environment:
      - API_ID=${API_ID:-123456}
      - API_HASH=${API_HASH:-dummy}
      - PHONE=${PHONE:-+10000000000}
      - SESSION_NAME=/app/sessions/ytb_session
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${S3_ACCESS_KEY}
      - MINIO_SECRET_KEY=${S3_SECRET_KEY}
      - MINIO_SECURE=false
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL:-http://localhost:9000}
      - MINIO_BUCKET=${S3_BUCKET_NAME}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ./sessions:/app/sessions
    depends_on:
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    networks: [app-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  relay-worker:
    image: ghcr.io/nikiforidi/ytb-audio-relay:${RELAY_VERSION:-latest}

    platform: linux/amd64
    environment:
      - API_ID=${API_ID:-123456}
      - API_HASH=${API_HASH:-dummy}
      - PHONE=${PHONE:-+10000000000}
      - SESSION_NAME=/app/sessions/ytb_session
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${S3_ACCESS_KEY}
      - MINIO_SECRET_KEY=${S3_SECRET_KEY}
      - MINIO_SECURE=false
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL:-http://localhost:9000}
      - MINIO_BUCKET=${S3_BUCKET_NAME}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ./sessions:/app/sessions
    depends_on:
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    networks: [app-net]
    command: python -m arq worker.WorkerSettings
    restart: unless-stopped
    healthcheck:
      disable: true

  # === Service 4: ytb-audio-preview ===
  preview-api:
    image: ghcr.io/nikiforidi/ytb-audio-preview:${PREVIEW_VERSION:-v0.1.2}
    platform: linux/amd64
    expose: ["8000"]
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${S3_ACCESS_KEY}
      - MINIO_SECRET_KEY=${S3_SECRET_KEY}
      - MINIO_SECURE=false
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL:-http://localhost:9000}
      - SOURCE_BUCKET=${S3_BUCKET_NAME}
      - PREVIEW_BUCKET=ytb-audio-previews
      - LISTING_BUCKET=listing-audio
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - REDIS_EVENT_CHANNEL=preview:trigger
    depends_on:
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
      createbuckets: { condition: service_completed_successfully }
    networks: [app-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  preview-worker:
    image: ghcr.io/nikiforidi/ytb-audio-preview:${PREVIEW_VERSION:-v0.1.2}
    platform: linux/amd64
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${S3_ACCESS_KEY}
      - MINIO_SECRET_KEY=${S3_SECRET_KEY}
      - MINIO_SECURE=false
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL:-http://localhost:9000}
      - SOURCE_BUCKET=${S3_BUCKET_NAME}
      - PREVIEW_BUCKET=ytb-audio-previews
      - LISTING_BUCKET=listing-audio
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - REDIS_EVENT_CHANNEL=preview:trigger
    depends_on:
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
      createbuckets: { condition: service_completed_successfully }
    networks: [app-net]
    command: python -m arq worker.WorkerSettings
    restart: unless-stopped
    healthcheck:
      disable: true

  # === Service 5: marketplace-service ===
  marketplace-service:
    image: ghcr.io/nikiforidi/marketplace-service:${MARKETPLACE_VERSION:-latest}
    platform: linux/amd64
    expose: ["8003"]
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD}@db:5432/marketplace_db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/4
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - CATALOG_SERVICE_URL=http://crate-digger:8000
      - AUTH_SERVICE_URL=http://auth-service:8000
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${S3_ACCESS_KEY}
      - MINIO_SECRET_KEY=${S3_SECRET_KEY}
      - MINIO_SECURE=false
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL:-http://localhost:9000}
      - LISTINGS_BUCKET=marketplace-listings
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-super_secret_internal_token_change_in_prod}
    depends_on:
      db: { condition: service_healthy }
      db-init: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
      createbuckets: { condition: service_completed_successfully }
      crate-digger: { condition: service_healthy }
      auth-service: { condition: service_healthy }
    networks: [app-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # === Shared Infrastructure ===
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: crate_digger
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [app-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crate_digger"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  db-init:
    image: postgres:15-alpine
    depends_on:
      db: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      PGPASSWORD=$${POSTGRES_PASSWORD} psql -h db -U postgres -c 'CREATE DATABASE auth_db;' 2>/dev/null;
      PGPASSWORD=$${POSTGRES_PASSWORD} psql -h db -U postgres -c 'CREATE DATABASE economy_db;' 2>/dev/null;
      PGPASSWORD=$${POSTGRES_PASSWORD} psql -h db -U postgres -c 'CREATE DATABASE marketplace_db;' 2>/dev/null;
      PGPASSWORD=$${POSTGRES_PASSWORD} psql -h db -U postgres -c 'CREATE DATABASE crate_digger;' 2>/dev/null;
      exit 0
      "
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks: [app-net]
    restart: "no"

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb
    volumes:
      - redis-data:/data
    networks: [app-net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio-data:/data
    networks: [app-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  createbuckets:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY} &&
      /usr/bin/mc mb --ignore-existing myminio/${S3_BUCKET_NAME} &&
      /usr/bin/mc mb --ignore-existing myminio/ytb-audio-previews &&
      /usr/bin/mc mb --ignore-existing myminio/marketplace-listings &&
      /usr/bin/mc mb --ignore-existing myminio/listing-audio &&
      /usr/bin/mc anonymous set public myminio/${S3_BUCKET_NAME} &&
      /usr/bin/mc anonymous set public myminio/ytb-audio-previews &&
      /usr/bin/mc anonymous set public myminio/marketplace-listings &&
      /usr/bin/mc anonymous set public myminio/listing-audio;
      exit 0
      "
    networks: [app-net]

volumes:
  postgres-data:
  redis-data:
  minio-data:
  prometheus-data:

networks:
  app-net:
    driver: bridge