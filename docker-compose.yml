services:
  gateway:
    image: nginx:alpine
    ports:
      - "${GATEWAY_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      crate-digger: { condition: service_healthy }
      audio-processor: { condition: service_healthy }
    networks: [app-net]
    restart: unless-stopped

  crate-digger:
    image: ghcr.io/nikiforidi/crate-digger:${CRATE_VERSION:-1.0.2}
    expose: ["8080"]
    networks: [app-net]
    restart: unless-stopped
    environment:
      - NODE_ENV=${ENVIRONMENT:-production}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  audio-processor:
    image: ghcr.io/nikiforidi/crate-digger-audio-processor:${AUDIO_VERSION:-v1.0.2}
    expose: ["8081"]
    networks: [app-net]
    restart: unless-stopped
    environment:
      - NODE_ENV=${ENVIRONMENT:-production}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  app-net: { driver: bridge }