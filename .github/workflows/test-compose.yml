name: CI Integration Test
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # 🔑 CRITICAL: Decode the Telegram session from GitHub Secrets into ./sessions/
      - name: Prepare Telegram Session
        run: |
          mkdir -p ./sessions
          echo "${{ secrets.TG_SESSION_BASE64 }}" | base64 --decode > ./sessions/ytb_session.session
          chmod 600 ./sessions/ytb_session.session
          echo "✅ Telegram session decoded successfully."

      - name: Start stack
        run: |
          # 1. Load base variables
          set -a
          source .env.example
          
          # 2. Inject GitHub Secrets
          export DISCOGS_TOKEN="${{ secrets.DISCOGS_TOKEN }}"
          export API_ID="${{ secrets.TG_API_ID }}"
          export API_HASH="${{ secrets.TG_API_HASH }}"
          export PHONE="${{ secrets.TG_PHONE }}"
          set +a
          
          # 3. Start the full stack (Replaced audio-processor with new microservices)
          docker compose --env-file .env.example up -d --pull always --wait \
            gateway crate-digger relay-api relay-worker preview-api preview-worker db redis minio
      
      - name: Init MinIO buckets
        run: docker compose --env-file .env.example run --rm createbuckets

      - name: Health Checks
        run: |
          echo "🔍 Checking Gateway..."
          curl -sf http://localhost/health
          
          echo "🔍 Checking Crate Digger API..."
          curl -sf http://localhost/api/crate/health
          
          echo "🔍 Checking ytb-audio-relay API..."
          curl -sf http://localhost/api/relay/health
          
          echo "🔍 Checking ytb-audio-preview API..."
          curl -sf http://localhost/api/preview/health

      - name: Debug on failure
        if: failure()
        run: |
          echo "📦 Container Status:"
          docker compose ps -a
          echo "📜 Recent Logs:"
          docker compose logs --tail=100

      - name: Cleanup
        if: always()
        # 🔑 Pass --env-file to suppress "variable not set" warnings during teardown
        run: docker compose --env-file .env.example down -v