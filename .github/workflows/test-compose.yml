name: CI Integration Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Start stack
        run: |
          # 1. Загружаем .env.example для базовых переменных
          set -a
          source .env.example
          
          # 2. Перезаписываем секрет из GitHub Secrets
          export DISCOGS_TOKEN="${{ secrets.DISCOGS_TOKEN }}"
          set +a
          
          # 3. Запускаем стек (переменные уже в окружении → интерполяция сработает)
          docker compose --env-file .env.example up -d --pull always --wait gateway crate-digger audio-processor db redis minio
      
      - name: Init MinIO buckets
        run: docker compose --env-file .env.example run --rm createbuckets

      - name: Health Checks
        run: |
          curl -sf http://localhost/health
          curl -sf http://localhost/api/crate/health
          curl -sf http://localhost/api/audio/health

      - name: Debug on failure
        if: failure()
        run: |
          docker compose ps -a
          docker compose logs --tail=100

      - name: Cleanup
        if: always()
        run: docker compose down -v