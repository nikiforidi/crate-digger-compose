name: CI Integration Test
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write  # ← Критично для GHCR

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      API_ID: ${{ secrets.TG_API_ID }}
      API_HASH: ${{ secrets.TG_API_HASH }}
      PHONE: ${{ secrets.TG_PHONE }}
      DISCOGS_TOKEN: ${{ secrets.DISCOGS_TOKEN }}
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      UNISENDER_API_KEY: ${{ secrets.UNISENDER_API_KEY }}
      UNISENDER_LIST_ID: ${{ secrets.UNISENDER_LIST_ID }}
      YOOKASSA_SHOP_ID: ${{ secrets.YOOKASSA_SHOP_ID }}
      YOOKASSA_SECRET_KEY: ${{ secrets.YOOKASSA_SECRET_KEY }}
      INITIAL_ADMIN_EMAIL: ${{ secrets.INITIAL_ADMIN_EMAIL }}
      INTERNAL_SERVICE_TOKEN: ${{ secrets.INTERNAL_SERVICE_TOKEN }}
      # 🔑 НОВОЕ: Переменные для фронтенда в тестовом окружении
      NEXT_PUBLIC_GATEWAY_URL: http://localhost
      NEXT_PUBLIC_API_URL: http://localhost

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Prepare Telegram Session
        run: |
          mkdir -p ./sessions
          chmod 777 ./sessions
          echo "${{ secrets.TG_SESSION_BASE64 }}" | tr -d '\n\r' | base64 --decode > ./sessions/ytb_session.session
          chmod 666 ./sessions/ytb_session.session
          if [ ! -s ./sessions/ytb_session.session ]; then
            echo "❌ CRITICAL ERROR: Decoded session file is EMPTY (0 bytes)!"
            exit 1
          fi

      - name: Start Infrastructure Only (DB, Redis, MinIO)
        run: |
          echo "🚀 Starting infrastructure services..."
          docker compose --env-file .env.testing up -d db redis minio createbuckets db-init
          echo "⏳ Waiting for PostgreSQL to be ready..."
          for i in {1..15}; do
            if docker compose --env-file .env.testing exec -T db pg_isready -U postgres > /dev/null 2>&1; then
              echo "✅ PostgreSQL is ready!"
              break
            fi
            sleep 2
          done
          echo "⏳ Waiting for db-init to complete..."
          for i in {1..10}; do
            if docker compose --env-file .env.testing ps db-init | grep -q "Exit 0"; then
              echo "✅ db-init completed!"
              break
            fi
            sleep 2
          done

      - name: Run database migrations (Alembic)
        run: |
          echo "🗄️ Applying Alembic migrations BEFORE starting app services..."
          set -a
          source .env.testing
          set +a
          echo "→ auth-service"
          docker compose --env-file .env.testing run --rm --no-deps auth-service alembic upgrade head
          echo "→ crate-digger"
          docker compose --env-file .env.testing run --rm --no-deps crate-digger alembic upgrade head
          echo "→ economy-service"
          docker compose --env-file .env.testing run --rm --no-deps economy-service alembic upgrade head
          echo "→ marketplace-service"
          docker compose --env-file .env.testing run --rm --no-deps marketplace-service alembic upgrade head
          echo "✅ All migrations applied successfully!"

      - name: Start Application Services
        run: |
          echo "🚀 Starting application services (now that DB is ready)..."
          docker compose --env-file .env.testing up -d

      - name: Wait for API readiness
        run: |
          echo "Waiting for APIs to become ready..."
          for i in {1..30}; do
            if curl -sf http://localhost/health > /dev/null; then
              echo "✅ All APIs are ready!"
              exit 0
            fi
            sleep 2
          done
          echo "❌ APIs failed to become ready in 60 seconds"
          docker compose --env-file .env.testing ps
          docker compose --env-file .env.testing logs auth-service
          exit 1

      - name: Init MinIO buckets
        run: docker compose --env-file .env.testing run --rm createbuckets

      - name: Health Checks
        run: |
          echo "🔍 Checking Gateway HTTP endpoint..."
          curl -sf http://localhost/health && echo " ✅"
          echo ""
          echo "🔍 Checking all services status via docker compose..."
          UNHEALTHY=$(docker compose --env-file .env.testing ps --format "{{.Service}} {{.Status}}" | \
            grep -E "^(auth-service|crate-digger|economy-service|marketplace-service|relay-api|preview-api|gateway|marketplace-frontend|db|redis|minio) " | \
            grep -v "(healthy)" || true)
          if [ -n "$UNHEALTHY" ]; then
            echo "❌ Some services are not healthy:"
            echo "$UNHEALTHY"
            exit 1
          fi
          echo "✅ All services are healthy!"
          docker compose --env-file .env.testing ps --format "table {{.Service}}\t{{.Status}}" | \
            grep -E "^(auth-service|crate-digger|economy-service|marketplace-service|relay-api|preview-api|gateway|marketplace-frontend|db|redis|minio) "

      - name: Debug on failure
        if: failure()
        run: |
          echo "📦 Container Status:"
          docker compose --env-file .env.testing ps -a
          echo ""
          echo "📜 Crate Digger Logs:"
          docker compose --env-file .env.testing logs crate-digger --tail=50
          echo ""
          echo "📜 Auth Service Logs:"
          docker compose --env-file .env.testing logs auth-service --tail=50
          echo ""
          echo "📜 Economy Service Logs:"
          docker compose --env-file .env.testing logs economy-service --tail=50
          echo ""
          echo "📜 Marketplace Service Logs:"
          docker compose --env-file .env.testing logs marketplace-service --tail=50
          echo ""
          echo "📜 Marketplace Frontend Logs:"  # 🔑 НОВОЕ
          docker compose --env-file .env.testing logs marketplace-frontend --tail=50
          echo ""
          echo "📜 Gateway Logs:"
          docker compose --env-file .env.testing logs gateway --tail=50

      - name: Cleanup
        if: always()
        run: docker compose --env-file .env.testing down -v