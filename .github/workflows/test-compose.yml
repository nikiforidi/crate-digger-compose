name: CI Integration Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Start stack
        run: |
          # 1. Загружаем .env.example для базовых переменных
          set -a
          source .env.example
          
          # 2. Перезаписываем секрет из GitHub Secrets
          export DISCOGS_TOKEN="${{ secrets.DISCOGS_TOKEN }}"
          
          # (Optional) Provide dummy Telegram creds for CI if not in secrets, 
          # so the relay service can at least boot and pass healthchecks
          export API_ID="${{ secrets.API_ID || 12345678 }}"
          export API_HASH="${{ secrets.API_HASH || 'dummy_ci_hash' }}"
          export PHONE="${{ secrets.PHONE || '+1234567890' }}"
          export TARGET_BOT="${{ secrets.TARGET_BOT || 'dummy_bot' }}"
          
          set +a
          
          # 3. Запускаем стек (переменные уже в окружении → интерполяция сработает)
          # ✅ REPLACED audio-processor with relay-api, relay-worker, preview-api, preview-worker
          docker compose --env-file .env.example up -d --pull always --wait \
            gateway \
            crate-digger \
            relay-api \
            relay-worker \
            preview-api \
            preview-worker \
            db \
            redis \
            minio
  
      - name: Init MinIO buckets
        run: docker compose --env-file .env.example run --rm createbuckets

      - name: Health Checks
        run: |
          # ✅ UPDATED: Check new microservice endpoints instead of /api/audio/health
          curl -sf http://localhost/health
          curl -sf http://localhost/api/crate/health
          curl -sf http://localhost/api/relay/health
          curl -sf http://localhost/api/preview/health

      - name: Debug on failure
        if: failure()
        run: |
          docker compose ps -a
          docker compose logs --tail=100 relay-api relay-worker preview-api preview-worker

      - name: Cleanup
        if: always()
        run: docker compose down -v