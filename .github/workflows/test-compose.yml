name: CI Integration Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # 🔑 Set environment variables at the job level
    env:
      # Telegram & Discogs
      API_ID: ${{ secrets.TG_API_ID }}
      API_HASH: ${{ secrets.TG_API_HASH }}
      PHONE: ${{ secrets.TG_PHONE }}
      DISCOGS_TOKEN: ${{ secrets.DISCOGS_TOKEN }}
      
      # 🔑 НОВОЕ: Переменные для auth-service и economy-service
      JWT_SECRET_KEY: "ci_test_jwt_secret_key_12345"
      UNISENDER_API_KEY: "ci_test_unisender_api_key"
      UNISENDER_LIST_ID: "ci_test_unisender_list_id"
      YOOKASSA_SHOP_ID: "ci_test_yookassa_shop_id"
      YOOKASSA_SECRET_KEY: "ci_test_yookassa_secret_key"
      
      # 🔑 НОВОЕ: Переменные для инфраструктуры
      DB_PASSWORD: "ci_test_postgres_password"
      REDIS_PASSWORD: "ci_test_redis_password"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      S3_BUCKET_NAME: "test-bucket"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Prepare Telegram Session
        run: |
          mkdir -p ./sessions
          chmod 777 ./sessions
          echo "${{ secrets.TG_SESSION_BASE64 }}" | tr -d '\n\r' | base64 --decode > ./sessions/ytb_session.session
          chmod 666 ./sessions/ytb_session.session
          echo "✅ Session file prepared: "
          ls -la ./sessions/
          if [ ! -s ./sessions/ytb_session.session ]; then
            echo "❌ CRITICAL ERROR: Decoded session file is EMPTY (0 bytes)!"
            exit 1
          fi
      
      - name: Cleanup old volumes
        run: |
          docker compose down -v || true
          docker volume prune -f || true

      - name: Start stack
        run: |
          # 1. Load base variables
          set -a
          source .env.example
          set +a
          
          # 🔑 NO --wait FLAG! The workers have healthchecks disabled.
          docker compose --env-file .env.example up -d --pull always \
            gateway auth-service economy-service crate-digger \
            relay-api relay-worker preview-api preview-worker \
            db db-init redis minio createbuckets

      # 🔑 ОБНОВЛЕНО: Добавлены проверки для auth и economy
      - name: Wait for API readiness
        run: |
          echo "Waiting for APIs to become ready..."
          for i in {1..30}; do
            if curl -sf http://localhost/api/crate/health && \
               curl -sf http://localhost/api/relay/health && \
               curl -sf http://localhost/api/preview/health && \
               curl -sf http://localhost/api/auth/health && \
               curl -sf http://localhost/api/economy/health; then
              echo "✅ All APIs are ready!"
              exit 0
            fi
            sleep 2
          done
          echo "❌ APIs failed to become ready in 60 seconds"
          exit 1

      - name: Init MinIO buckets
        run: docker compose --env-file .env.example run --rm createbuckets

      # 🔑 ОБНОВЛЕНО: Добавлены проверки для auth и economy
      - name: Health Checks
        run: |
          echo "🔍 Checking Gateway..."
          curl -sf http://localhost/health
          
          echo "🔍 Checking Auth Service..."
          curl -sf http://localhost/api/auth/health
          
          echo "🔍 Checking Economy Service..."
          curl -sf http://localhost/api/economy/health
          
          echo "🔍 Checking Crate Digger API..."
          curl -sf http://localhost/api/crate/health
          
          echo "🔍 Checking ytb-audio-relay API..."
          curl -sf http://localhost/api/relay/health
          
          echo "🔍 Checking ytb-audio-preview API..."
          curl -sf http://localhost/api/preview/health

      # 🔑 ОБНОВЛЕНО: Добавлен вывод логов упавших сервисов
      - name: Debug on failure
        if: failure()
        run: |
          echo "📦 Container Status:"
          docker compose ps -a
          echo "📜 Auth Service Logs:"
          docker compose logs auth-service --tail=50
          echo "📜 Economy Service Logs:"
          docker compose logs economy-service --tail=50
          echo "📜 Recent Logs:"
          docker compose logs --tail=100

      - name: Cleanup
        if: always()
        run: docker compose --env-file .env.example down -v