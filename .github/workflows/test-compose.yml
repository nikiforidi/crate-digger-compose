name: Integration Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Prepare environment
        run: |
          # Экспортируем переменные в окружение шага (для интерполяции ${VAR})
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> $GITHUB_ENV
          echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" >> $GITHUB_ENV
          echo "S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}" >> $GITHUB_ENV
          echo "S3_BUCKET_NAME=test-bucket" >> $GITHUB_ENV
          echo "POSTGRES_DB=crate_digger" >> $GITHUB_ENV

      - name: Start stack
        run: docker compose --env-file .env.example up -d --pull always --wait

      - name: Health Checks
        run: |
          curl -sf http://localhost/health
          curl -sf http://localhost/api/crate/health
          curl -sf http://localhost/api/audio/health

      - name: Debug on failure
        if: failure()
        run: |
          docker compose ps -a
          docker compose logs --tail=100

      - name: Cleanup
        if: always()
        run: docker compose down -v