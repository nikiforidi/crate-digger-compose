events { worker_connections 1024; }

http {
    upstream crate_digger {
        server crate-digger:8080;
    }
    
    upstream audio_processor {
        server audio-processor:8081;
    }

    server {
        listen 80;

        # Маршрутизация по префиксу пути
        location /api/crate/ {
            rewrite ^/api/crate/(.*)$ /$1 break;
            proxy_pass http://crate_digger;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/audio/ {
            rewrite ^/api/audio/(.*)$ /$1 break;
            proxy_pass http://audio_processor;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check gateway
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}