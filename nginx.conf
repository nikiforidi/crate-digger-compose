events { worker_connections 1024; }

http {
    # ✅ Правильные порты из docker-compose.yml
    upstream crate_digger {
        server crate-digger:8000;
    }
    
    upstream audio_processor {
        server audio-processor:3000;
    }

    server {
        listen 80;

        # Health check gateway
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Маршрутизация к crate-digger (Python/FastAPI)
        location /api/crate/ {
            rewrite ^/api/crate/(.*)$ /$1 break;
            proxy_pass http://crate_digger;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # Маршрутизация к audio-processor (Node.js/TS)
        location /api/audio/ {
            rewrite ^/api/audio/(.*)$ /$1 break;
            proxy_pass http://audio_processor;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # Fallback
        location / {
            return 404 "Not Found\n";
            add_header Content-Type text/plain;
        }
    }
}