events {
    worker_connections 1024;
}

http {
    # ✅ Upstreams matching docker-compose.yml service names and ports
    upstream crate_digger {
        server crate-digger:8000;
    }

    upstream relay_api {
        server relay-api:8000;
    }

    upstream preview_api {
        server preview-api:8000;
    }

    server {
        listen 80;

        # Health check gateway
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Маршрутизация к crate-digger (Python/FastAPI)
        location /api/crate/ {
            rewrite ^/api/crate/(.*)$ /$1 break;
            proxy_pass http://crate_digger;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # Маршрутизация к ytb-audio-relay (Python/FastAPI)
        # (Заменяет старый audio-processor)
        location /api/relay/ {
            rewrite ^/api/relay/(.*)$ /$1 break;
            proxy_pass http://relay_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 120s; # Увеличено для долгих задач скачивания аудио
        }

        # Маршрутизация к ytb-audio-preview (Python/FastAPI)
        location /api/preview/ {
            rewrite ^/api/preview/(.*)$ /$1 break;
            proxy_pass http://preview_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        # Fallback
        location / {
            return 404 "Not Found\n";
            add_header Content-Type text/plain;
        }
    }
}